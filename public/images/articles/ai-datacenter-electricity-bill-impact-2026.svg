<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: home interior at dusk, family looking at electricity bill, DC glowing through window -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1530"/>
      <stop offset="50%" stop-color="#1a2348"/>
      <stop offset="100%" stop-color="#2d2410"/>
    </linearGradient>
    <radialGradient id="lamplight" cx="30%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d1530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dcglow" cx="78%" cy="38%" r="30%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#lamplight)"/>
  <rect width="1200" height="630" fill="url(#dcglow)"/>

  <!-- Window frame (view to DC at night) -->
  <rect x="730" y="90" width="380" height="290" rx="6" fill="#0a1228" stroke="#3d3424" stroke-width="6"/>
  <line x1="920" y1="90" x2="920" y2="380" stroke="#3d3424" stroke-width="5"/>
  <line x1="730" y1="235" x2="1110" y2="235" stroke="#3d3424" stroke-width="5"/>
  <!-- DC building through window -->
  <rect x="760" y="150" width="140" height="220" fill="#0f1d3d"/>
  <g fill="#3b82f6" opacity="0.85">
    <rect x="770" y="160" width="16" height="11" rx="1"/><rect x="792" y="160" width="16" height="11" rx="1"/>
    <rect x="814" y="160" width="16" height="11" rx="1"/><rect x="836" y="160" width="16" height="11" rx="1"/>
    <rect x="770" y="180" width="16" height="11" rx="1"/><rect x="792" y="180" width="16" height="11" rx="1"/>
    <rect x="814" y="180" width="16" height="11" rx="1"/>
    <rect x="770" y="200" width="16" height="11" rx="1"/><rect x="792" y="200" width="16" height="11" rx="1"/>
    <rect x="814" y="200" width="16" height="11" rx="1"/><rect x="836" y="200" width="16" height="11" rx="1"/>
  </g>
  <!-- second DC building -->
  <rect x="940" y="180" width="120" height="190" fill="#0f1d3d"/>
  <g fill="#60a5fa" opacity="0.7">
    <rect x="950" y="192" width="14" height="10" rx="1"/><rect x="970" y="192" width="14" height="10" rx="1"/>
    <rect x="990" y="192" width="14" height="10" rx="1"/><rect x="1010" y="192" width="14" height="10" rx="1"/>
    <rect x="950" y="210" width="14" height="10" rx="1"/><rect x="970" y="210" width="14" height="10" rx="1"/>
  </g>
  <!-- transmission tower silhouette through window -->
  <polygon points="1085,370 1075,250 1095,250" fill="#0a0f20"/>
  <line x1="1052" y1="262" x2="1118" y2="262" stroke="#0a0f20" stroke-width="4"/>
  <line x1="1058" y1="290" x2="1112" y2="290" stroke="#0a0f20" stroke-width="3"/>

  <!-- Table surface (foreground) -->
  <rect x="0" y="430" width="1200" height="200" fill="#2d2010"/>
  <rect x="0" y="430" width="1200" height="12" fill="#42301a"/>

  <!-- Electricity bill paper on table -->
  <g transform="rotate(-4 320 400)">
    <rect x="160" y="300" width="320" height="210" rx="4" fill="#f8f6ee" stroke="#d6d3c4" stroke-width="2"/>
    <rect x="180" y="320" width="180" height="18" rx="2" fill="#1e293b"/>
    <text x="186" y="334" font-family="sans-serif" font-size="13" font-weight="700" fill="white">電気ご使用量のお知らせ</text>
    <line x1="180" y1="356" x2="460" y2="356" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="184" y="382" font-family="sans-serif" font-size="13" fill="#475569">ご請求金額</text>
    <text x="456" y="412" font-family="sans-serif" font-size="34" font-weight="900" fill="#dc2626" text-anchor="end">¥18,420</text>
    <line x1="180" y1="428" x2="460" y2="428" stroke="#cbd5e1" stroke-width="1"/>
    <text x="184" y="450" font-family="sans-serif" font-size="11" fill="#64748b">うち託送料金相当額・容量拠出金…</text>
    <text x="184" y="470" font-family="sans-serif" font-size="11" fill="#64748b">前年同月比</text>
    <text x="456" y="472" font-family="sans-serif" font-size="15" font-weight="900" fill="#dc2626" text-anchor="end">▲ +8.2%</text>
  </g>

  <!-- Rising graph arrow over the scene -->
  <g stroke="#ef4444" stroke-width="5" fill="none" opacity="0.85" filter="url(#glow)">
    <path d="M 480 420 L 560 380 L 620 395 L 700 330 L 780 345 L 880 265"/>
    <polygon points="872,252 896,262 878,282" fill="#ef4444"/>
  </g>
  <!-- graph data points -->
  <g fill="#fca5a5">
    <circle cx="560" cy="380" r="5"/><circle cx="620" cy="395" r="5"/>
    <circle cx="700" cy="330" r="5"/><circle cx="780" cy="345" r="5"/>
  </g>

  <!-- Warm lamp in corner -->
  <ellipse cx="120" cy="280" rx="90" ry="120" fill="#fbbf24" opacity="0.12" filter="url(#blur8)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="190" height="38" rx="19" fill="#ca8a04"/>
  <text x="135" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">電力・冷却技術</text>

  <!-- US shock badge top right -->
  <rect x="940" y="32" width="220" height="44" rx="8" fill="#dc2626" opacity="0.92"/>
  <text x="1050" y="60" font-family="sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">米国では最大76%上昇</text>

  <!-- Accent bar -->
  <rect x="40" y="415" width="5" height="125" rx="2.5" fill="#fbbf24"/>

  <!-- Kicker -->
  <text x="60" y="474" font-family="sans-serif" font-size="54" font-weight="900" fill="#fde68a" filter="url(#ts)">電気代、上がるの？</text>

  <!-- Main headline -->
  <text x="60" y="547" font-family="sans-serif" font-size="34" font-weight="900" fill="white" filter="url(#ts)">AIデータセンター急増と家庭の負担を考える</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#fcd34d" filter="url(#ts)">託送料金・容量拠出金 — "見えにくい経路"で進む転嫁の仕組みを解説</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
