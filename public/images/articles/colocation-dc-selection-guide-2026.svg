  <g fill="#22d3ee" filter="url(#ledglow)"><circle cx="944" cy="193" r="3"/><circle cx="944" cy="210" r="3"/><circle cx="944" cy="227" r="3"/><circle cx="944" cy="244" r="3"/></g>
