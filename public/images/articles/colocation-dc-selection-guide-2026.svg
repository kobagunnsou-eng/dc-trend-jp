  <g fill="#0a1e3a"><rect x="847" y="212" width="64" height="9" rx="1"/><rect x="847" y="228" width="64" height="9" rx="1"/><rect x="847" y="244" width="64" height="9" rx="1"/><rect x="847" y="260" width="64" height="9" rx="1"/><rect x="847" y="276" width="64" height="9" rx="1"/><rect x="847" y="292" width="64" height="9" rx="1"/><rect x="847" y="308" width="64" height="9" rx="1"/></g>
  <g fill="#34d399" filter="url(#ledglow)"><circle cx="910" cy="216" r="2.5"/><circle cx="910" cy="232" r="2.5"/><circle cx="910" cy="248" r="2.5"/></g>

