<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: professional data center interior, perspective shot of server rows -->
    <linearGradient id="dcbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00060f"/>
      <stop offset="50%" stop-color="#010d1e"/>
      <stop offset="100%" stop-color="#040f22"/>
    </linearGradient>
    <radialGradient id="aisleglow" cx="50%" cy="52%" r="45%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00060f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorglow" cx="50%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00060f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
