<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <rect x="0" y="0" width="12" height="630" fill="#2563eb"/>
  <!-- server rack -->
  <rect x="460" y="130" width="140" height="340" rx="4" fill="none" stroke="#475569" stroke-width="2.5"/>
  <rect x="600" y="130" width="140" height="340" rx="4" fill="none" stroke="#475569" stroke-width="2.5"/>
  <!-- rack units -->
  {[150,175,200,225,250,275,300,325,350,375,400,425].map((y,i) => `
  <rect x="468" y="${y}" width="124" height="18" rx="1" fill="#1e40af" opacity="${0.4 + (i%3)*0.15}"/>
  <circle cx="${576}" cy="${y+9}" r="3" fill="${i%2===0?'#34d399':'#fbbf24'}"/>
  `).join('')}
  {[150,175,200,225,250,275,300,325,350,375,400,425].map((y,i) => `
  <rect x="608" y="${y}" width="124" height="18" rx="1" fill="#1e3a8a" opacity="${0.4 + (i%3)*0.15}"/>
  <circle cx="${716}" cy="${y+9}" r="3" fill="${i%3===0?'#34d399':i%3===1?'#fbbf24':'#f87171'}"/>
  `).join('')}
  <!-- checklist overlay -->
  <rect x="760" y="200" width="260" height="220" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5" opacity="0.9"/>
  <line x1="780" y1="240" x2="1000" y2="240" stroke="#1e293b" stroke-width="1"/>
  <line x1="780" y1="280" x2="1000" y2="280" stroke="#1e293b" stroke-width="1"/>
  <line x1="780" y1="320" x2="1000" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="780" y1="360" x2="1000" y2="360" stroke="#1e293b" stroke-width="1"/>
  <!-- check marks -->
  <polyline points="790,225 800,235 820,215" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <polyline points="790,265 800,275 820,255" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <polyline points="790,305 800,315 820,295" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="800" cy="345" r="6" fill="none" stroke="#64748b" stroke-width="2"/>
  <rect x="0" y="555" width="1200" height="75" fill="#0f172a" opacity="0.9"/>
  <rect x="0" y="553" width="1200" height="3" fill="#2563eb"/>
  <text x="40" y="600" font-family="sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">コロケーションDC選定チェックリスト 2026年版</text>
  <text x="40" y="618" font-family="sans-serif" font-size="16" fill="#64748b">国内DC動向 ｜ DCトレンド研究</text>
</svg>
