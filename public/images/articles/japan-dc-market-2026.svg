<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0c1445"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="cityglow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#nightsky)"/>
  <rect width="1200" height="630" fill="url(#cityglow)"/>
  <!-- skyscrapers Tokyo -->
  <rect x="80" y="300" width="60" height="280" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <rect x="155" y="220" width="80" height="360" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <rect x="250" y="260" width="55" height="320" fill="#0f172a"/>
  <rect x="320" y="180" width="100" height="400" fill="#0f172a" stroke="#2563eb" stroke-width="1"/>
  <rect x="435" y="140" width="75" height="440" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <rect x="525" y="100" width="90" height="480" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <rect x="630" y="130" width="80" height="450" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
  <rect x="725" y="200" width="95" height="380" fill="#0f172a" stroke="#2563eb" stroke-width="1"/>
  <rect x="835" y="240" width="65" height="340" fill="#0f172a"/>
  <rect x="915" y="170" width="85" height="410" fill="#0f172a" stroke="#1e40af" stroke-width="1"/>
  <rect x="1015" y="230" width="70" height="350" fill="#0f172a"/>
  <rect x="1100" y="280" width="80" height="300" fill="#0f172a"/>
  <!-- building windows glowing -->
  <g fill="#fbbf24" opacity="0.7">
    <rect x="165" y="240" width="12" height="10" rx="1"/><rect x="185" y="240" width="12" height="10" rx="1"/>
    <rect x="165" y="260" width="12" height="10" rx="1"/><rect x="185" y="260" width="12" height="10" rx="1"/>
    <rect x="330" y="200" width="12" height="10" rx="1"/><rect x="350" y="200" width="12" height="10" rx="1"/>
    <rect x="370" y="200" width="12" height="10" rx="1"/>
    <rect x="445" y="160" width="12" height="10" rx="1"/><rect x="465" y="160" width="12" height="10" rx="1"/>
    <rect x="485" y="160" width="12" height="10" rx="1"/>
  </g>
  <!-- DC building highlight (tallest) -->
  <rect x="525" y="100" width="90" height="480" fill="none" stroke="#60a5fa" stroke-width="3" filter="url(#neon)"/>
  <g fill="#3b82f6" opacity="0.9">
    {[120,145,170,195,220,245,270,295,320,345].map(y=>`
    <rect x="535" y="${y}" width="16" height="12" rx="1"/>
    <rect x="558" y="${y}" width="16" height="12" rx="1"/>
    <rect x="581" y="${y}" width="16" height="12" rx="1"/>
    `).join('')}
  </g>
  <!-- holographic data arrows -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.8" filter="url(#neon)">
    <path d="M 200 350 L 350 250 L 500 180 L 650 150 L 800 170 L 950 200"/>
    <polygon points="950,190 965,200 950,210" fill="#22d3ee"/>
  </g>
  <!-- rising bars -->
  <g opacity="0.5">
    <rect x="150" y="460" width="40" height="80" fill="#1d4ed8"/>
    <rect x="210" y="420" width="40" height="120" fill="#2563eb"/>
    <rect x="270" y="380" width="40" height="160" fill="#3b82f6"/>
    <rect x="330" y="340" width="40" height="200" fill="#60a5fa"/>
  </g>
  <!-- ground reflection -->
  <rect x="0" y="580" width="1200" height="50" fill="#0c1445" opacity="0.8"/>
  <rect x="0" y="558" width="1200" height="4" fill="#3b82f6"/>
  <text x="40" y="600" font-family="sans-serif" font-size="30" font-weight="900" fill="white">国内DCマーケット 空前の投資ラッシュ2026</text>
  <text x="40" y="618" font-family="sans-serif" font-size="15" fill="#93c5fd">国内DC動向 ｜ DCトレンド研究</text>
</svg>
