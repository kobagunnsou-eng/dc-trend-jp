<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: aerial night view of Tokyo city lights -->
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00040e"/>
      <stop offset="45%" stop-color="#020820"/>
      <stop offset="100%" stop-color="#060e30"/>
    </linearGradient>
    <radialGradient id="cityglow" cx="50%" cy="75%" r="65%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00040e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonglow" cx="72%" cy="18%" r="18%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00040e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.8)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="neonline"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#nightsky)"/>
  <rect width="1200" height="630" fill="url(#cityglow)"/>
  <rect width="1200" height="630" fill="url(#moonglow)"/>

  <!-- Starfield -->
  <g fill="white">
    <circle cx="85" cy="40" r="1.2"/><circle cx="190" cy="65" r="1.4"/><circle cx="310" cy="28" r="1"/>
    <circle cx="470" cy="55" r="1.3"/><circle cx="620" cy="35" r="1.1"/><circle cx="760" cy="60" r="1.5"/>
    <circle cx="880" cy="22" r="1.2"/><circle cx="1010" cy="50" r="1.3"/><circle cx="1130" cy="30" r="1.1"/>
    <circle cx="140" cy="105" r="1"/><circle cx="390" cy="90" r="1.2"/><circle cx="680" cy="80" r="1"/>
    <circle cx="950" cy="95" r="1.3"/><circle cx="1070" cy="70" r="1"/>
  </g>

  <!-- Moon -->
  <circle cx="864" cy="115" r="38" fill="#f1f5f9" opacity="0.88"/>
  <circle cx="848" cy="108" r="35" fill="#00040e"/>

  <!-- Tokyo skyline (skyscrapers, aerial view silhouette) -->
  <!-- Background buildings (blurred, atmospheric) -->
  <g filter="url(#blur6)" opacity="0.5">
    <rect x="0" y="310" width="55" height="320" fill="#0a1228"/>
    <rect x="60" y="275" width="70" height="355" fill="#0c1535"/>
    <rect x="140" y="290" width="50" height="340" fill="#0a1228"/>
  </g>
  <!-- Mid buildings -->
  <rect x="200" y="248" width="65" height="382" fill="#0d1530"/>
  <rect x="275" y="195" width="90" height="435" fill="#0f1a38"/>
  <rect x="375" y="160" width="80" height="470" fill="#0d1530"/>
  <rect x="465" y="130" width="100" height="500" fill="#111d40" stroke="#1e3a8a" stroke-width="0.5"/>
  <!-- Tallest DC tower (highlighted) -->
  <rect x="575" y="90" width="110" height="540" fill="#111d40" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Blue tinted DC building glow -->
  <rect x="575" y="90" width="110" height="540" fill="none" stroke="#60a5fa" stroke-width="2" filter="url(#neonline)" opacity="0.6"/>
  <rect x="695" y="115" width="95" height="515" fill="#0f1a38" stroke="#1e40af" stroke-width="0.5"/>
  <rect x="800" y="170" width="85" height="460" fill="#0d1530"/>
  <rect x="895" y="215" width="75" height="415" fill="#0f1a38"/>
  <rect x="980" y="250" width="80" height="380" fill="#0a1228"/>
  <rect x="1070" y="290" width="65" height="340" fill="#0d1530"/>
  <rect x="1145" y="325" width="60" height="305" fill="#0a1228"/>

  <!-- Building windows - warm yellow (office lights) -->
  <g fill="#fbbf24" opacity="0.7">
    <rect x="285" y="215" width="10" height="8" rx="1"/><rect x="302" y="215" width="10" height="8" rx="1"/>
    <rect x="285" y="232" width="10" height="8" rx="1"/>
    <rect x="385" y="178" width="10" height="8" rx="1"/><rect x="402" y="178" width="10" height="8" rx="1"/>
    <rect x="419" y="178" width="10" height="8" rx="1"/>
    <rect x="475" y="150" width="10" height="8" rx="1"/><rect x="492" y="150" width="10" height="8" rx="1"/>
    <rect x="509" y="150" width="10" height="8" rx="1"/><rect x="475" y="168" width="10" height="8" rx="1"/>
    <rect x="808" y="188" width="10" height="8" rx="1"/><rect x="825" y="188" width="10" height="8" rx="1"/>
    <rect x="905" y="230" width="10" height="8" rx="1"/><rect x="922" y="230" width="10" height="8" rx="1"/>
  </g>
  <!-- DC building blue lights -->
  <g fill="#60a5fa" opacity="0.9">
    <rect x="583" y="108" width="14" height="10" rx="1"/><rect x="603" y="108" width="14" height="10" rx="1"/>
    <rect x="623" y="108" width="14" height="10" rx="1"/><rect x="663" y="108" width="14" height="10" rx="1"/>
    <rect x="583" y="126" width="14" height="10" rx="1"/><rect x="603" y="126" width="14" height="10" rx="1"/>
    <rect x="623" y="126" width="14" height="10" rx="1"/><rect x="643" y="126" width="14" height="10" rx="1"/>
    <rect x="583" y="144" width="14" height="10" rx="1"/><rect x="603" y="144" width="14" height="10" rx="1"/>
    <rect x="663" y="144" width="14" height="10" rx="1"/>
  </g>

  <!-- City grid street lights (aerial) -->
  <g fill="#f59e0b" opacity="0.35">
    <rect x="0" y="450" width="1200" height="2" rx="1"/>
    <rect x="0" y="490" width="1200" height="1.5" rx="1"/>
    <rect x="0" y="525" width="1200" height="1.5" rx="1"/>
    <rect x="200" y="430" width="1" height="200"/>
    <rect x="400" y="430" width="1.5" height="200"/>
    <rect x="600" y="430" width="1.5" height="200"/>
    <rect x="800" y="430" width="1.5" height="200"/>
    <rect x="1000" y="430" width="1" height="200"/>
  </g>
  <!-- Dot lights for city grid -->
  <g fill="#fbbf24" opacity="0.4">
    <circle cx="100" cy="470" r="2"/><circle cx="200" cy="455" r="2"/><circle cx="300" cy="472" r="2"/>
    <circle cx="400" cy="460" r="2"/><circle cx="500" cy="475" r="2"/><circle cx="600" cy="462" r="2"/>
    <circle cx="700" cy="478" r="2"/><circle cx="800" cy="465" r="2"/><circle cx="900" cy="480" r="2"/>
    <circle cx="1000" cy="468" r="2"/><circle cx="1100" cy="473" r="2"/>
    <circle cx="150" cy="500" r="1.5"/><circle cx="350" cy="495" r="1.5"/><circle cx="550" cy="505" r="1.5"/>
    <circle cx="750" cy="498" r="1.5"/><circle cx="950" cy="507" r="1.5"/><circle cx="1150" cy="500" r="1.5"/>
  </g>

  <!-- Data flow arrow (aerial hologrhic) -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.6" filter="url(#neonline)">
    <path d="M 180 360 L 320 280 L 480 230 L 640 200 L 800 220 L 980 250"/>
    <polygon points="978,240 996,250 978,260" fill="#22d3ee"/>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="330" width="1200" height="300" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="165" height="38" rx="19" fill="#1d4ed8"/>
  <text x="122" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">国内DC動向</text>

  <!-- Accent bar (gold) -->
  <rect x="40" y="415" width="5" height="125" rx="2.5" fill="#f59e0b"/>

  <!-- Kicker -->
  <text x="60" y="474" font-family="sans-serif" font-size="54" font-weight="900" fill="#fbbf24" filter="url(#ts)">5年で5倍の投資額</text>

  <!-- Main headline -->
  <text x="60" y="548" font-family="sans-serif" font-size="36" font-weight="900" fill="white" filter="url(#ts)">国内DCマーケット 空前の投資ラッシュ2026</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#93c5fd" filter="url(#ts)">関西・北海道・九州まで拡大 — 主要拠点マップ付き</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
