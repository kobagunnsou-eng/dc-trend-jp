<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="tokyonight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0020"/>
      <stop offset="40%" stop-color="#1a0a2e"/>
      <stop offset="70%" stop-color="#2d1b47"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="towerglow" cx="38%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#dc2626" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="constructglow" cx="62%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0"/>
    </radialGradient>
    <filter id="towerneon"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#tokyonight)"/>
  <rect width="1200" height="630" fill="url(#towerglow)"/>
  <rect width="1200" height="630" fill="url(#constructglow)"/>
  <!-- dramatic storm clouds -->
  <ellipse cx="200" cy="80" rx="280" ry="100" fill="#1c0533" opacity="0.9"/>
  <ellipse cx="700" cy="50" rx="400" ry="120" fill="#1a0a2e" opacity="0.85"/>
  <ellipse cx="1100" cy="90" rx="250" ry="90" fill="#1c0533" opacity="0.75"/>
  <!-- city skyline background -->
  <rect x="0" y="380" width="80" height="250" fill="#0f0a1a"/>
  <rect x="50" y="340" width="60" height="290" fill="#120f1f"/>
  <rect x="120" y="360" width="70" height="270" fill="#0f0a1a"/>
  <rect x="900" y="370" width="75" height="260" fill="#0f0a1a"/>
  <rect x="990" y="350" width="65" height="280" fill="#120f1f"/>
  <rect x="1065" y="390" width="80" height="240" fill="#0f0a1a"/>
  <rect x="1155" y="410" width="60" height="220" fill="#120f1f"/>
  <!-- city window lights -->
  <g fill="#fbbf24" opacity="0.5">
    <rect x="130" y="380" width="12" height="9" rx="1"/><rect x="152" y="380" width="12" height="9" rx="1"/>
    <rect x="130" y="400" width="12" height="9" rx="1"/>
    <rect x="910" y="390" width="12" height="9" rx="1"/><rect x="932" y="390" width="12" height="9" rx="1"/>
    <rect x="1000" y="370" width="12" height="9" rx="1"/><rect x="1080" y="410" width="12" height="9" rx="1"/>
  </g>
  <!-- TOKYO TOWER - iconic orange truss structure -->
  <!-- main tower body -->
  <polygon points="420,60 395,560 445,560" fill="#ea580c" opacity="0.95" filter="url(#towerneon)"/>
  <!-- tower cross bracing -->
  <g stroke="#c2410c" stroke-width="2" opacity="0.8">
    <line x1="400" y1="120" x2="438" y2="120"/><line x1="396" y1="160" x2="442" y2="160"/>
    <line x1="393" y1="200" x2="445" y2="200"/><line x1="390" y1="240" x2="448" y2="240"/>
    <line x1="387" y1="280" x2="451" y2="280"/><line x1="384" y1="320" x2="454" y2="320"/>
    <line x1="381" y1="360" x2="457" y2="360"/><line x1="378" y1="400" x2="460" y2="400"/>
    <line x1="375" y1="440" x2="463" y2="440"/><line x1="372" y1="480" x2="466" y2="480"/>
    <line x1="369" y1="520" x2="469" y2="520"/>
    <!-- X bracing -->
    <line x1="400" y1="120" x2="438" y2="160"/><line x1="438" y1="120" x2="400" y2="160"/>
    <line x1="396" y1="200" x2="442" y2="240"/><line x1="442" y1="200" x2="396" y2="240"/>
    <line x1="393" y1="280" x2="448" y2="320"/><line x1="448" y1="280" x2="393" y2="320"/>
    <line x1="390" y1="360" x2="454" y2="400"/><line x1="454" y1="360" x2="390" y2="400"/>
    <line x1="387" y1="440" x2="460" y2="480"/><line x1="460" y1="440" x2="387" y2="480"/>
  </g>
  <!-- observation deck platform -->
  <rect x="380" y="228" width="80" height="18" rx="2" fill="#c2410c" stroke="#ea580c" stroke-width="1.5"/>
  <!-- top antenna spire -->
  <line x1="420" y1="60" x2="420" y2="20" stroke="#ea580c" stroke-width="4"/>
  <circle cx="420" cy="15" r="6" fill="#fbbf24" filter="url(#towerneon)"/>
  <!-- tower glow halo -->
  <ellipse cx="420" cy="300" rx="80" ry="300" fill="#f97316" opacity="0.08" filter="url(#softglow2)"/>
  <!-- CONSTRUCTION SITE - DC Building under construction -->
  <!-- foundation / ground level -->
  <rect x="530" y="400" width="340" height="160" fill="#1c1917" stroke="#57534e" stroke-width="2"/>
  <!-- building frame going up -->
  <rect x="550" y="200" width="300" height="210" fill="#292524" stroke="#78716c" stroke-width="2"/>
  <!-- scaffolding / construction frame -->
  <g stroke="#fbbf24" stroke-width="2" opacity="0.7">
    <!-- vertical poles -->
    <line x1="548" y1="180" x2="548" y2="560"/><line x1="620" y1="180" x2="620" y2="560"/>
    <line x1="700" y1="180" x2="700" y2="560"/><line x1="780" y1="180" x2="780" y2="560"/>
    <line x1="852" y1="180" x2="852" y2="560"/>
    <!-- horizontal scaffold bands -->
    <line x1="548" y1="220" x2="852" y2="220"/><line x1="548" y1="280" x2="852" y2="280"/>
    <line x1="548" y1="340" x2="852" y2="340"/><line x1="548" y1="400" x2="852" y2="400"/>
  </g>
  <!-- safety nets / sheeting on upper floors -->
  <rect x="548" y="180" width="304" height="220" fill="#fbbf24" opacity="0.06"/>
  <!-- construction cranes -->
  <!-- crane 1 -->
  <line x1="870" y1="560" x2="870" y2="80" stroke="#64748b" stroke-width="6"/>
  <line x1="870" y1="80" x2="1050" y2="105" stroke="#64748b" stroke-width="5"/>
  <line x1="870" y1="80" x2="750" y2="100" stroke="#64748b" stroke-width="4"/>
  <!-- crane cable and hook -->
  <line x1="980" y1="108" x2="980" y2="220" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4"/>
  <rect x="972" y="220" width="16" height="12" rx="2" fill="#fbbf24"/>
  <!-- crane warning lights -->
  <circle cx="870" cy="75" r="7" fill="#ef4444" filter="url(#towerneon)"/>
  <circle cx="1050" cy="102" r="5" fill="#ef4444" filter="url(#towerneon)"/>
  <!-- crane 2 smaller -->
  <line x1="540" y1="560" x2="540" y2="150" stroke="#475569" stroke-width="4"/>
  <line x1="540" y1="150" x2="680" y2="168" stroke="#475569" stroke-width="3"/>
  <line x1="540" y1="150" x2="450" y2="163" stroke="#475569" stroke-width="3"/>
  <circle cx="540" cy="145" r="5" fill="#ef4444" filter="url(#towerneon)"/>
  <!-- building windows - glowing server racks -->
  <g fill="#1e40af" opacity="0.8">
    <rect x="565" y="215" width="40" height="28" rx="2"/><rect x="620" y="215" width="40" height="28" rx="2"/>
    <rect x="675" y="215" width="40" height="28" rx="2"/><rect x="730" y="215" width="40" height="28" rx="2"/>
    <rect x="785" y="215" width="40" height="28" rx="2"/>
    <rect x="565" y="260" width="40" height="28" rx="2"/><rect x="620" y="260" width="40" height="28" rx="2"/>
    <rect x="675" y="260" width="40" height="28" rx="2"/><rect x="730" y="260" width="40" height="28" rx="2"/>
    <rect x="785" y="260" width="40" height="28" rx="2"/>
    <rect x="565" y="305" width="40" height="28" rx="2"/><rect x="620" y="305" width="40" height="28" rx="2"/>
    <rect x="675" y="305" width="40" height="28" rx="2"/>
  </g>
  <g fill="#22d3ee" filter="url(#towerneon)" opacity="0.9">
    <circle cx="600" cy="229" r="4"/><circle cx="655" cy="229" r="4"/><circle cx="710" cy="274" r="4"/>
    <circle cx="765" cy="229" r="4"/>
  </g>
  <!-- LAWSUIT / protest banner -->
  <rect x="560" y="350" width="280" height="42" rx="4" fill="#dc2626" opacity="0.92"/>
  <text x="580" y="378" font-family="sans-serif" font-size="20" font-weight="900" fill="white">住民提訴 ─ 建設差し止め</text>
  <!-- ground construction barriers -->
  <g fill="#f59e0b" opacity="0.8">
    <rect x="530" y="548" width="30" height="12" rx="1"/>
    <rect x="575" y="548" width="30" height="12" rx="1"/>
    <rect x="620" y="548" width="30" height="12" rx="1"/>
    <rect x="665" y="548" width="30" height="12" rx="1"/>
    <rect x="710" y="548" width="30" height="12" rx="1"/>
    <rect x="755" y="548" width="30" height="12" rx="1"/>
    <rect x="800" y="548" width="30" height="12" rx="1"/>
  </g>
  <!-- bottom title bar -->
  <rect x="0" y="558" width="1200" height="72" fill="#0c0020" opacity="0.95"/>
  <rect x="0" y="556" width="1200" height="4" fill="#f97316"/>
  <text x="40" y="600" font-family="sans-serif" font-size="28" font-weight="900" fill="white">東京タワー隣接DC NEXTDC TK1 住民訴訟</text>
  <text x="40" y="618" font-family="sans-serif" font-size="15" fill="#fed7aa">国内DC動向 ｜ DCトレンド研究</text>
</svg>
