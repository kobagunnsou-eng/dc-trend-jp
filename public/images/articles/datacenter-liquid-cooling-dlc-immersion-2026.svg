<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: macro of liquid-cooled GPU server, coolant tubes glowing cyan -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#020d1a"/>
      <stop offset="50%" stop-color="#06243a"/>
      <stop offset="100%" stop-color="#0a3a52"/>
    </linearGradient>
    <radialGradient id="coolantglow" cx="55%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#020d1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tubeflow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="warmtube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.78)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="blur10"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#coolantglow)"/>

  <!-- GPU board base (macro) -->
  <rect x="340" y="120" width="540" height="320" rx="8" fill="#04141f" stroke="#0e4a5f" stroke-width="2.5"/>
  <!-- Cold plates on GPUs -->
  <g>
    <rect x="380" y="170" width="100" height="100" rx="6" fill="#0a2535" stroke="#22d3ee" stroke-width="2"/>
    <rect x="510" y="170" width="100" height="100" rx="6" fill="#0a2535" stroke="#22d3ee" stroke-width="2"/>
    <rect x="640" y="170" width="100" height="100" rx="6" fill="#0a2535" stroke="#22d3ee" stroke-width="2"/>
    <rect x="770" y="170" width="70" height="100" rx="6" fill="#0a2535" stroke="#22d3ee" stroke-width="2"/>
    <!-- cold plate fin texture -->
    <g stroke="#0e7490" stroke-width="1.5" opacity="0.7">
      <line x1="390" y1="180" x2="390" y2="260"/><line x1="402" y1="180" x2="402" y2="260"/>
      <line x1="414" y1="180" x2="414" y2="260"/><line x1="426" y1="180" x2="426" y2="260"/>
      <line x1="438" y1="180" x2="438" y2="260"/><line x1="450" y1="180" x2="450" y2="260"/>
      <line x1="462" y1="180" x2="462" y2="260"/>
      <line x1="520" y1="180" x2="520" y2="260"/><line x1="532" y1="180" x2="532" y2="260"/>
      <line x1="544" y1="180" x2="544" y2="260"/><line x1="556" y1="180" x2="556" y2="260"/>
      <line x1="568" y1="180" x2="568" y2="260"/><line x1="580" y1="180" x2="580" y2="260"/>
      <line x1="592" y1="180" x2="592" y2="260"/>
      <line x1="650" y1="180" x2="650" y2="260"/><line x1="662" y1="180" x2="662" y2="260"/>
      <line x1="674" y1="180" x2="674" y2="260"/><line x1="686" y1="180" x2="686" y2="260"/>
      <line x1="698" y1="180" x2="698" y2="260"/><line x1="710" y1="180" x2="710" y2="260"/>
      <line x1="722" y1="180" x2="722" y2="260"/>
    </g>
  </g>
  <!-- GPU labels -->
  <g fill="#22d3ee" opacity="0.5" font-family="monospace" font-size="10">
    <text x="430" y="288" text-anchor="middle">GPU 0</text>
    <text x="560" y="288" text-anchor="middle">GPU 1</text>
    <text x="690" y="288" text-anchor="middle">GPU 2</text>
  </g>

  <!-- COLD coolant inlet tubes (cyan, glowing) -->
  <g filter="url(#glow)">
    <path d="M 60 200 Q 200 200 280 210 L 380 220" fill="none" stroke="url(#tubeflow)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 60 240 Q 200 250 300 255 L 510 230" fill="none" stroke="url(#tubeflow)" stroke-width="14" stroke-linecap="round"/>
  </g>
  <!-- coolant flow direction dots -->
  <g fill="#a5f3fc">
    <circle cx="150" cy="201" r="3"/><circle cx="220" cy="204" r="3"/><circle cx="300" cy="213" r="3"/>
    <circle cx="150" cy="244" r="3"/><circle cx="230" cy="252" r="3"/>
  </g>

  <!-- WARM coolant outlet tubes (orange, heated) -->
  <g filter="url(#glow)">
    <path d="M 770 230 L 900 240 Q 1050 250 1140 240" fill="none" stroke="url(#warmtube)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 740 280 L 880 290 Q 1040 300 1140 285" fill="none" stroke="url(#warmtube)" stroke-width="14" stroke-linecap="round"/>
  </g>
  <g fill="#fed7aa">
    <circle cx="950" cy="244" r="3"/><circle cx="1040" cy="247" r="3"/>
    <circle cx="950" cy="294" r="3"/><circle cx="1040" cy="296" r="3"/>
  </g>

  <!-- CDU / manifold connectors -->
  <rect x="345" y="300" width="500" height="36" rx="4" fill="#06222f" stroke="#0e4a5f" stroke-width="1.5"/>
  <g fill="#0a3445">
    <rect x="360" y="308" width="40" height="20" rx="2"/><rect x="420" y="308" width="40" height="20" rx="2"/>
    <rect x="480" y="308" width="40" height="20" rx="2"/><rect x="540" y="308" width="40" height="20" rx="2"/>
    <rect x="600" y="308" width="40" height="20" rx="2"/><rect x="660" y="308" width="40" height="20" rx="2"/>
    <rect x="720" y="308" width="40" height="20" rx="2"/><rect x="780" y="308" width="40" height="20" rx="2"/>
  </g>
  <!-- quick-connect fittings -->
  <g fill="#22d3ee" filter="url(#glow)">
    <circle cx="380" cy="318" r="4"/><circle cx="500" cy="318" r="4"/><circle cx="620" cy="318" r="4"/><circle cx="740" cy="318" r="4"/>
  </g>

  <!-- PCB traces below -->
  <g stroke="#0e4a5f" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M 360 350 V 420 H 460"/><path d="M 540 350 V 400 H 640"/>
    <path d="M 720 350 V 420 H 800"/>
  </g>
  <g fill="#0891b2" opacity="0.6">
    <circle cx="460" cy="420" r="4"/><circle cx="640" cy="400" r="4"/><circle cx="800" cy="420" r="4"/>
  </g>

  <!-- Background server racks bokeh -->
  <rect x="60" y="80" width="50" height="380" rx="3" fill="#06243a" opacity="0.4" filter="url(#blur10)"/>
  <rect x="1090" y="90" width="60" height="370" rx="3" fill="#06243a" opacity="0.4" filter="url(#blur10)"/>
  <ellipse cx="85" cy="270" rx="18" ry="160" fill="#22d3ee" opacity="0.06" filter="url(#blur10)"/>
  <ellipse cx="1120" cy="270" rx="18" ry="160" fill="#f97316" opacity="0.06" filter="url(#blur10)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="190" height="38" rx="19" fill="#0891b2"/>
  <text x="135" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">電力・冷却技術</text>

  <!-- Spec badge top right -->
  <rect x="935" y="32" width="225" height="44" rx="8" fill="#0e7490" opacity="0.93"/>
  <text x="1047" y="60" font-family="sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">1ラック120kWの衝撃</text>

  <!-- Accent bar -->
  <rect x="40" y="415" width="5" height="125" rx="2.5" fill="#22d3ee"/>

  <!-- Kicker -->
  <text x="60" y="474" font-family="sans-serif" font-size="54" font-weight="900" fill="#67e8f9" filter="url(#ts)">空冷の限界、液冷の時代へ</text>

  <!-- Main headline -->
  <text x="60" y="547" font-family="sans-serif" font-size="34" font-weight="900" fill="white" filter="url(#ts)">AIサーバーを冷やす最新技術のすべて</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#a5f3fc" filter="url(#ts)">DLC vs 液浸冷却 — PUE1.1を実現する仕組みと国内採用最前線</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
