<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: power transmission towers at stormy sunset -->
    <linearGradient id="stormsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0010"/>
      <stop offset="25%" stop-color="#3b0a0a"/>
      <stop offset="55%" stop-color="#7c1d0a"/>
      <stop offset="75%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="horizon" cx="50%" cy="68%" r="55%">
      <stop offset="0%" stop-color="#fed7aa" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d0010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flash" cx="52%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d0010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.92)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#stormsky)"/>
  <rect width="1200" height="630" fill="url(#horizon)"/>
  <rect width="1200" height="630" fill="url(#flash)"/>

  <!-- Storm clouds texture -->
  <ellipse cx="200" cy="100" rx="300" ry="130" fill="#1c0010" opacity="0.8"/>
  <ellipse cx="700" cy="70" rx="420" ry="150" fill="#1a0008" opacity="0.85"/>
  <ellipse cx="1100" cy="110" rx="280" ry="110" fill="#1c0010" opacity="0.7"/>
  <ellipse cx="450" cy="50" rx="200" ry="90" fill="#250510" opacity="0.7"/>
  <ellipse cx="900" cy="40" rx="250" ry="100" fill="#200812" opacity="0.6"/>

  <!-- Lightning bolt -->
  <polygon points="640,45 608,240 638,240 590,520 668,218 635,218 672,45" fill="#fef9c3" filter="url(#glow)" opacity="0.9"/>
  <polygon points="640,45 608,240 638,240 590,520 668,218 635,218 672,45" fill="white" opacity="0.25" filter="url(#glow)"/>
  <!-- Secondary lightning -->
  <polyline points="380,80 355,190 370,190 340,310" fill="none" stroke="#fde68a" stroke-width="3" opacity="0.55"/>
  <polyline points="880,65 908,175 893,175 925,295" fill="none" stroke="#fde68a" stroke-width="2.5" opacity="0.45"/>

  <!-- Power transmission towers (foreground silhouettes) -->
  <!-- Tower 1 (center-left) -->
  <g fill="#0a0005">
    <!-- Main tower body -->
    <polygon points="320,560 298,240 342,240"/>
    <!-- Cross arms -->
    <rect x="240" y="268" width="160" height="8" rx="2"/>
    <rect x="255" y="310" width="130" height="7" rx="2"/>
    <rect x="268" y="348" width="104" height="6" rx="2"/>
    <!-- Tower lattice detail -->
    <line x1="298" y1="240" x2="320" y2="560" stroke="#0a0005" stroke-width="2"/>
    <line x1="342" y1="240" x2="320" y2="560" stroke="#0a0005" stroke-width="2"/>
  </g>
  <!-- Insulator strings -->
  <line x1="240" y1="272" x2="240" y2="295" stroke="#1a0008" stroke-width="3"/>
  <line x1="400" y1="272" x2="400" y2="295" stroke="#1a0008" stroke-width="3"/>
  <line x1="255" y1="314" x2="255" y2="334" stroke="#1a0008" stroke-width="2.5"/>
  <line x1="385" y1="314" x2="385" y2="334" stroke="#1a0008" stroke-width="2.5"/>

  <!-- Power lines across scene -->
  <g stroke="#0a0005" stroke-width="2.5" fill="none">
    <path d="M 0 280 Q 200 295 320 272 Q 440 268 600 285 Q 760 302 900 275 Q 1050 265 1200 280"/>
    <path d="M 0 310 Q 200 325 320 314 Q 440 308 600 318 Q 760 330 900 310 Q 1050 298 1200 310"/>
  </g>

  <!-- Tower 2 (right side) -->
  <g fill="#0a0005">
    <polygon points="880,560 858,280 902,280"/>
    <rect x="800" y="305" width="160" height="8" rx="2"/>
    <rect x="816" y="345" width="128" height="7" rx="2"/>
    <rect x="828" y="380" width="104" height="6" rx="2"/>
  </g>
  <line x1="800" y1="309" x2="800" y2="330" stroke="#1a0008" stroke-width="3"/>
  <line x1="960" y1="309" x2="960" y2="330" stroke="#1a0008" stroke-width="3"/>

  <!-- Tower 3 (far right, smaller / distant) -->
  <g fill="#1a0008" opacity="0.6" filter="url(#blur8)">
    <polygon points="1100,560 1084,340 1116,340"/>
    <rect x="1048" y="358" width="104" height="6" rx="2"/>
  </g>

  <!-- Ground / horizon glow -->
  <rect x="0" y="500" width="1200" height="130" fill="#3d1508" opacity="0.5"/>
  <rect x="0" y="510" width="1200" height="4" fill="#f97316" opacity="0.6"/>

  <!-- Ground flash below lightning -->
  <ellipse cx="620" cy="555" rx="100" ry="22" fill="#fef9c3" opacity="0.45" filter="url(#glow)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="200" height="38" rx="19" fill="#b91c1c"/>
  <text x="140" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">AI・HPCインフラ</text>

  <!-- Red accent bar -->
  <rect x="40" y="415" width="5" height="125" rx="2.5" fill="#ef4444"/>

  <!-- Kicker (big warning text) -->
  <text x="60" y="474" font-family="sans-serif" font-size="58" font-weight="900" fill="#fef08a" filter="url(#ts)">電 力 危 機</text>

  <!-- Main headline -->
  <text x="60" y="548" font-family="sans-serif" font-size="36" font-weight="900" fill="white" filter="url(#ts)">AIデータセンターが電力インフラを揺るがす</text>

  <!-- Sub-line -->
  <text x="60" y="594" font-family="sans-serif" font-size="17" fill="#fca5a5" filter="url(#ts)">2030年、最大15GW不足の試算 — 現場の実態を報告</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
