<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: industrial area, diesel generator, smog, residential buildings -->
    <linearGradient id="smogbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1008"/>
      <stop offset="35%" stop-color="#2d1a0a"/>
      <stop offset="65%" stop-color="#4a2510"/>
      <stop offset="100%" stop-color="#6b3310"/>
    </linearGradient>
    <radialGradient id="heathalo" cx="45%" cy="68%" r="42%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#dc2626" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1c1008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="smoke"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="softsmoke"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#smogbg)"/>
  <rect width="1200" height="630" fill="url(#heathalo)"/>

  <!-- Smog layer (thick smoke atmosphere) -->
  <ellipse cx="500" cy="200" rx="350" ry="200" fill="#78350f" opacity="0.5" filter="url(#smoke)"/>
  <ellipse cx="600" cy="140" rx="400" ry="180" fill="#92400e" opacity="0.4" filter="url(#softsmoke)"/>
  <ellipse cx="700" cy="100" rx="450" ry="160" fill="#a16207" opacity="0.3" filter="url(#softsmoke)"/>
  <ellipse cx="450" cy="80" rx="300" ry="130" fill="#6b7280" opacity="0.3" filter="url(#smoke)"/>

  <!-- Residential buildings (left side - victims) -->
  <rect x="0" y="300" width="90" height="330" fill="#1a1008"/>
  <rect x="55" y="265" width="75" height="365" fill="#1c120a"/>
  <rect x="138" y="285" width="80" height="345" fill="#1a1008"/>
  <rect x="228" y="248" width="70" height="382" fill="#221408"/>
  <!-- Residential windows (angry yellow) -->
  <g fill="#fbbf24" opacity="0.8">
    <rect x="12" y="320" width="16" height="12" rx="1"/><rect x="36" y="320" width="16" height="12" rx="1"/>
    <rect x="12" y="345" width="16" height="12" rx="1"/><rect x="36" y="345" width="16" height="12" rx="1"/>
    <rect x="65" y="283" width="16" height="12" rx="1"/><rect x="90" y="283" width="16" height="12" rx="1"/>
    <rect x="65" y="308" width="16" height="12" rx="1"/>
    <rect x="148" y="303" width="16" height="12" rx="1"/><rect x="173" y="303" width="16" height="12" rx="1"/>
    <rect x="148" y="328" width="16" height="12" rx="1"/>
    <rect x="238" y="268" width="16" height="12" rx="1"/><rect x="263" y="268" width="16" height="12" rx="1"/>
  </g>

  <!-- Residential buildings (right side) -->
  <rect x="950" y="320" width="85" height="310" fill="#1a1008"/>
  <rect x="1043" y="295" width="75" height="335" fill="#1c120a"/>
  <rect x="1126" y="340" width="75" height="290" fill="#1a1008"/>
  <g fill="#fbbf24" opacity="0.8">
    <rect x="962" y="340" width="16" height="12" rx="1"/><rect x="987" y="340" width="16" height="12" rx="1"/>
    <rect x="1055" y="315" width="16" height="12" rx="1"/><rect x="1080" y="315" width="16" height="12" rx="1"/>
  </g>

  <!-- MAIN GENERATOR (center) -->
  <!-- Concrete pad -->
  <rect x="330" y="450" width="540" height="35" rx="3" fill="#2d1f0e"/>
  <!-- Generator body -->
  <rect x="355" y="310" width="550" height="160" rx="10" fill="#1c1309" stroke="#4a3520" stroke-width="3"/>
  <!-- Engine vents -->
  <g fill="#0f0b05">
    <rect x="375" y="330" width="80" height="100" rx="3" stroke="#3a2a15" stroke-width="1.5"/>
    <rect x="475" y="330" width="80" height="100" rx="3" stroke="#3a2a15" stroke-width="1.5"/>
    <rect x="755" y="330" width="80" height="100" rx="3" stroke="#3a2a15" stroke-width="1.5"/>
    <rect x="855" y="330" width="80" height="100" rx="3" stroke="#3a2a15" stroke-width="1.5"/>
  </g>
  <!-- Engine cylinders -->
  <circle cx="415" cy="380" r="32" fill="none" stroke="#5c3d1a" stroke-width="2.5"/>
  <circle cx="415" cy="380" r="19" fill="#140e05" stroke="#6b4a20" stroke-width="2"/>
  <circle cx="415" cy="380" r="9" fill="#f97316" opacity="0.6"/>
  <circle cx="515" cy="380" r="32" fill="none" stroke="#5c3d1a" stroke-width="2.5"/>
  <circle cx="515" cy="380" r="19" fill="#140e05" stroke="#6b4a20" stroke-width="2"/>
  <circle cx="515" cy="380" r="9" fill="#ea580c" opacity="0.5"/>
  <circle cx="795" cy="380" r="32" fill="none" stroke="#5c3d1a" stroke-width="2.5"/>
  <circle cx="795" cy="380" r="19" fill="#140e05" stroke="#6b4a20" stroke-width="2"/>
  <circle cx="795" cy="380" r="9" fill="#f97316" opacity="0.55"/>
  <circle cx="895" cy="380" r="32" fill="none" stroke="#5c3d1a" stroke-width="2.5"/>
  <circle cx="895" cy="380" r="19" fill="#140e05" stroke="#6b4a20" stroke-width="2"/>
  <circle cx="895" cy="380" r="9" fill="#ea580c" opacity="0.5"/>

  <!-- Heat haze above generator -->
  <ellipse cx="600" cy="320" rx="240" ry="22" fill="#f97316" opacity="0.08" filter="url(#smoke)"/>

  <!-- EXHAUST STACKS -->
  <!-- Stack 1 -->
  <rect x="500" y="230" width="30" height="90" fill="#3a2a15" stroke="#4a3520" stroke-width="2"/>
  <rect x="497" y="215" width="36" height="18" rx="4" fill="#4a3520"/>
  <!-- Stack 2 -->
  <rect x="620" y="220" width="30" height="100" fill="#3a2a15" stroke="#4a3520" stroke-width="2"/>
  <rect x="617" y="204" width="36" height="18" rx="4" fill="#4a3520"/>

  <!-- Thick smoke plumes from stacks -->
  <ellipse cx="515" cy="195" rx="28" ry="22" fill="#78350f" opacity="0.75" filter="url(#smoke)"/>
  <ellipse cx="510" cy="162" rx="42" ry="35" fill="#92400e" opacity="0.65" filter="url(#smoke)"/>
  <ellipse cx="518" cy="130" rx="58" ry="45" fill="#a16207" opacity="0.5" filter="url(#smoke)"/>
  <ellipse cx="525" cy="98" rx="72" ry="52" fill="#9ca3af" opacity="0.35" filter="url(#softsmoke)"/>
  <ellipse cx="635" cy="185" rx="28" ry="22" fill="#78350f" opacity="0.7" filter="url(#smoke)"/>
  <ellipse cx="640" cy="152" rx="42" ry="35" fill="#92400e" opacity="0.6" filter="url(#smoke)"/>
  <ellipse cx="648" cy="120" rx="58" ry="45" fill="#a16207" opacity="0.45" filter="url(#smoke)"/>

  <!-- Warning signs -->
  <polygon points="870,240 825,330 915,330" fill="#fef08a" stroke="#f59e0b" stroke-width="2.5" opacity="0.9"/>
  <line x1="870" y1="262" x2="870" y2="305" stroke="#1c1008" stroke-width="5"/>
  <circle cx="870" cy="318" r="6" fill="#1c1008"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="165" height="38" rx="19" fill="#92400e"/>
  <text x="122" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">国内DC動向</text>

  <!-- Warning accent bar -->
  <rect x="40" y="415" width="5" height="125" rx="2.5" fill="#f97316"/>

  <!-- Kicker -->
  <text x="60" y="475" font-family="sans-serif" font-size="54" font-weight="900" fill="#fde68a" filter="url(#ts)">排煙・騒音トラブル</text>

  <!-- Main headline -->
  <text x="60" y="548" font-family="sans-serif" font-size="36" font-weight="900" fill="white" filter="url(#ts)">DC発電機問題 — 住民vs事業者の対立が激化</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#fdba74" filter="url(#ts)">立地規制の空白地帯 全国で相次ぐ苦情申告の実態</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
