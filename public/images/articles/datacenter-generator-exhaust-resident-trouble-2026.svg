<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="smogsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="40%" stop-color="#431407"/>
      <stop offset="70%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="engineheat" cx="42%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1c0a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="smokecloud" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6b7280" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1c0a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="smokeglow"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="heatdist"><feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="5"/><feDisplacementMap in="SourceGraphic" scale="8"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#smogsky)"/>
  <rect width="1200" height="630" fill="url(#engineheat)"/>
  <!-- smoke clouds billowing up -->
  <ellipse cx="500" cy="180" rx="180" ry="120" fill="#374151" opacity="0.85" filter="url(#smokeglow)"/>
  <ellipse cx="560" cy="100" rx="200" ry="130" fill="#4b5563" opacity="0.75" filter="url(#smokeglow)"/>
  <ellipse cx="620" cy="50" rx="230" ry="100" fill="#6b7280" opacity="0.6" filter="url(#smokeglow)"/>
  <ellipse cx="680" cy="20" rx="260" ry="90" fill="#9ca3af" opacity="0.4" filter="url(#smokeglow)"/>
  <!-- residential buildings silhouette (background) -->
  <rect x="0" y="330" width="120" height="300" fill="#111827"/>
  <rect x="50" y="290" width="80" height="340" fill="#0f172a"/>
  <rect x="140" y="350" width="90" height="280" fill="#111827"/>
  <rect x="240" y="310" width="70" height="320" fill="#1f2937"/>
  <!-- lit windows in residential buildings - angry yellow/red -->
  <g fill="#fbbf24" opacity="0.8">
    <rect x="20" y="350" width="18" height="14" rx="1"/>
    <rect x="50" y="350" width="18" height="14" rx="1"/>
    <rect x="20" y="380" width="18" height="14" rx="1"/>
    <rect x="80" y="310" width="18" height="14" rx="1"/>
    <rect x="155" y="370" width="18" height="14" rx="1"/>
    <rect x="185" y="370" width="18" height="14" rx="1"/>
    <rect x="255" y="330" width="18" height="14" rx="1"/>
  </g>
  <!-- right side buildings -->
  <rect x="950" y="340" width="100" height="290" fill="#111827"/>
  <rect x="1060" y="310" width="80" height="320" fill="#0f172a"/>
  <rect x="1150" y="350" width="60" height="280" fill="#1f2937"/>
  <g fill="#fbbf24" opacity="0.8">
    <rect x="965" y="360" width="18" height="14" rx="1"/>
    <rect x="995" y="360" width="18" height="14" rx="1"/>
    <rect x="1075" y="330" width="18" height="14" rx="1"/>
  </g>
  <!-- GENERATOR MACHINE - main subject, center stage -->
  <rect x="310" y="380" width="580" height="200" rx="10" fill="#1c1917" stroke="#57534e" stroke-width="3"/>
  <!-- generator body details -->
  <rect x="330" y="400" width="240" height="150" rx="5" fill="#292524" stroke="#44403c" stroke-width="2"/>
  <rect x="590" y="400" width="240" height="150" rx="5" fill="#292524" stroke="#44403c" stroke-width="2"/>
  <!-- engine pistons / cylinders -->
  <circle cx="450" cy="475" r="50" fill="none" stroke="#57534e" stroke-width="3"/>
  <circle cx="450" cy="475" r="32" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <circle cx="450" cy="475" r="15" fill="#ea580c" opacity="0.8"/>
  <circle cx="710" cy="475" r="50" fill="none" stroke="#57534e" stroke-width="3"/>
  <circle cx="710" cy="475" r="32" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <circle cx="710" cy="475" r="15" fill="#f97316" opacity="0.7"/>
  <!-- heat shimmer above generator -->
  <ellipse cx="600" cy="390" rx="250" ry="30" fill="#f97316" opacity="0.12" filter="url(#smokeglow)"/>
  <!-- exhaust pipes -->
  <rect x="470" y="310" width="28" height="80" fill="#44403c" stroke="#57534e" stroke-width="2"/>
  <rect x="468" y="295" width="32" height="20" rx="3" fill="#57534e"/>
  <rect x="620" y="310" width="28" height="80" fill="#44403c" stroke="#57534e" stroke-width="2"/>
  <rect x="618" y="295" width="32" height="20" rx="3" fill="#57534e"/>
  <!-- smoke from exhaust pipes (thick orange-grey) -->
  <ellipse cx="484" cy="270" rx="30" ry="25" fill="#92400e" opacity="0.7"/>
  <ellipse cx="484" cy="235" rx="42" ry="35" fill="#78350f" opacity="0.6"/>
  <ellipse cx="636" cy="270" rx="30" ry="25" fill="#92400e" opacity="0.65"/>
  <ellipse cx="636" cy="235" rx="42" ry="35" fill="#78350f" opacity="0.55"/>
  <!-- warning sign -->
  <polygon points="870,270 820,370 920,370" fill="#fef08a" stroke="#f59e0b" stroke-width="3"/>
  <line x1="870" y1="295" x2="870" y2="340" stroke="#1c0a00" stroke-width="5"/>
  <circle cx="870" cy="355" r="6" fill="#1c0a00"/>
  <!-- noise waves from generator -->
  <g stroke="#f97316" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 310 430 Q 280 420 260 430 Q 240 440 220 430"/>
    <path d="M 310 460 Q 270 445 240 460 Q 210 475 180 460"/>
    <path d="M 310 490 Q 265 472 230 490 Q 195 508 160 490"/>
    <path d="M 890 430 Q 920 420 940 430 Q 960 440 980 430"/>
    <path d="M 890 460 Q 930 445 960 460 Q 990 475 1020 460"/>
  </g>
  <!-- ground -->
  <rect x="0" y="575" width="1200" height="55" fill="#0c0a09" opacity="0.95"/>
  <rect x="0" y="556" width="1200" height="4" fill="#ea580c"/>
  <text x="40" y="597" font-family="sans-serif" font-size="28" font-weight="900" fill="white">DC発電機「排煙・騒音」問題と住民トラブル</text>
  <text x="40" y="618" font-family="sans-serif" font-size="15" fill="#fdba74">国内DC動向 ｜ DCトレンド研究</text>
</svg>
