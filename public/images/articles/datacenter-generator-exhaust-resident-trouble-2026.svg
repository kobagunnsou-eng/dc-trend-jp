<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <rect x="0" y="0" width="12" height="630" fill="#ea580c"/>
  <!-- generator body -->
  <rect x="380" y="280" width="440" height="200" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2.5"/>
  <rect x="420" y="310" width="160" height="120" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="610" y="310" width="160" height="120" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <!-- engine detail -->
  <circle cx="500" cy="370" r="35" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="500" cy="370" r="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <circle cx="690" cy="370" r="35" fill="none" stroke="#475569" stroke-width="2"/>
  <circle cx="690" cy="370" r="20" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- exhaust smoke -->
  <ellipse cx="520" cy="240" rx="25" ry="40" fill="#374151" opacity="0.6"/>
  <ellipse cx="550" cy="190" rx="35" ry="50" fill="#4b5563" opacity="0.5"/>
  <ellipse cx="580" cy="140" rx="45" ry="55" fill="#6b7280" opacity="0.35"/>
  <ellipse cx="620" cy="100" rx="55" ry="50" fill="#9ca3af" opacity="0.2"/>
  <!-- exhaust pipe -->
  <rect x="510" y="260" width="20" height="30" fill="#374151"/>
  <!-- warning symbol -->
  <polygon points="900,200 840,320 960,320" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
  <line x1="900" y1="225" x2="900" y2="285" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="900" cy="305" r="5" fill="#f59e0b"/>
  <rect x="0" y="555" width="1200" height="75" fill="#0f172a" opacity="0.9"/>
  <rect x="0" y="553" width="1200" height="3" fill="#ea580c"/>
  <text x="40" y="600" font-family="sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">DC発電機「排煙・騒音」問題と住民トラブル</text>
  <text x="40" y="618" font-family="sans-serif" font-size="16" fill="#64748b">国内DC動向 ｜ DCトレンド研究</text>
