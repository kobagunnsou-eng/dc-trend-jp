<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: compact modular reactor beside a glowing DC at dawn, clean energy feel -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061428"/>
      <stop offset="45%" stop-color="#0b2b4a"/>
      <stop offset="80%" stop-color="#0e4a5a"/>
      <stop offset="100%" stop-color="#0f5c50"/>
    </linearGradient>
    <radialGradient id="dawn" cx="50%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#061428" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reactorglow" cx="32%" cy="52%" r="26%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#061428" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dawn)"/>
  <rect width="1200" height="630" fill="url(#reactorglow)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="110" cy="48" r="1.2"/><circle cx="300" cy="35" r="1.1"/><circle cx="520" cy="55" r="1.3"/>
    <circle cx="760" cy="40" r="1.1"/><circle cx="980" cy="60" r="1.2"/><circle cx="1120" cy="38" r="1"/>
    <circle cx="420" cy="85" r="1"/><circle cx="880" cy="90" r="1.1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="470" width="1200" height="160" fill="#07231e"/>
  <rect x="0" y="470" width="1200" height="10" fill="#0f5c50" opacity="0.7"/>

  <!-- SMR containment building (left, compact dome) -->
  <!-- dome -->
  <path d="M 220 470 L 220 330 Q 220 240 320 240 Q 420 240 420 330 L 420 470 Z" fill="#dbe7e4" stroke="#94a3a8" stroke-width="2.5"/>
  <!-- dome shading -->
  <path d="M 240 470 L 240 335 Q 240 258 320 255 L 320 470 Z" fill="#c3d4d0" opacity="0.6"/>
  <!-- dome panel lines -->
  <g stroke="#94a3a8" stroke-width="1.2" opacity="0.7" fill="none">
    <path d="M 220 380 H 420"/><path d="M 224 330 H 416"/>
    <path d="M 320 240 V 470"/><path d="M 265 252 V 470"/><path d="M 375 252 V 470"/>
  </g>
  <!-- atom symbol on dome -->
  <g stroke="#0d9488" stroke-width="2.5" fill="none" opacity="0.9">
    <ellipse cx="320" cy="340" rx="34" ry="13"/>
    <ellipse cx="320" cy="340" rx="34" ry="13" transform="rotate(60 320 340)"/>
    <ellipse cx="320" cy="340" rx="34" ry="13" transform="rotate(-60 320 340)"/>
  </g>
  <circle cx="320" cy="340" r="5" fill="#0d9488"/>
  <!-- small auxiliary building -->
  <rect x="130" y="400" width="90" height="70" fill="#b8c9c5" stroke="#94a3a8" stroke-width="1.5"/>
  <rect x="145" y="415" width="18" height="14" fill="#0e4a5a" opacity="0.7"/>
  <rect x="175" y="415" width="18" height="14" fill="#0e4a5a" opacity="0.7"/>

  <!-- Power lines from SMR to DC -->
  <g filter="url(#glow)">
    <path d="M 420 380 Q 520 340 600 350 Q 680 360 740 340" fill="none" stroke="#5eead4" stroke-width="5" opacity="0.85"/>
    <path d="M 420 410 Q 530 380 620 388 Q 700 395 740 380" fill="none" stroke="#2dd4bf" stroke-width="3.5" opacity="0.6"/>
  </g>
  <!-- energy pulse dots -->
  <g fill="#a7f3d0" filter="url(#glow)">
    <circle cx="500" cy="352" r="4.5"/><circle cx="600" cy="350" r="4"/><circle cx="700" cy="345" r="4.5"/>
  </g>
  <!-- pylon between -->
  <polygon points="565,470 557,300 573,300" fill="#0a1a24"/>
  <line x1="535" y1="315" x2="595" y2="315" stroke="#0a1a24" stroke-width="3.5"/>
  <line x1="540" y1="345" x2="590" y2="345" stroke="#0a1a24" stroke-width="3"/>

  <!-- Data center (right) -->
  <rect x="740" y="250" width="360" height="220" rx="5" fill="#0a1a33" stroke="#22d3ee" stroke-width="2"/>
  <!-- DC roofline cooling -->
  <g fill="#10243d" stroke="#155e75" stroke-width="1">
    <rect x="755" y="228" width="52" height="24" rx="2"/><rect x="820" y="224" width="52" height="28" rx="2"/>
    <rect x="885" y="228" width="52" height="24" rx="2"/><rect x="950" y="224" width="52" height="28" rx="2"/>
    <rect x="1015" y="228" width="52" height="24" rx="2"/>
  </g>
  <!-- DC server windows -->
  <g fill="#22d3ee" opacity="0.85" filter="url(#glow)">
    <rect x="760" y="272" width="40" height="26" rx="2"/><rect x="812" y="272" width="40" height="26" rx="2"/>
    <rect x="864" y="272" width="40" height="26" rx="2"/><rect x="916" y="272" width="40" height="26" rx="2"/>
    <rect x="968" y="272" width="40" height="26" rx="2"/><rect x="1020" y="272" width="40" height="26" rx="2"/>
    <rect x="760" y="312" width="40" height="26" rx="2"/><rect x="812" y="312" width="40" height="26" rx="2"/>
    <rect x="864" y="312" width="40" height="26" rx="2"/><rect x="916" y="312" width="40" height="26" rx="2"/>
    <rect x="968" y="312" width="40" height="26" rx="2"/>
    <rect x="760" y="352" width="40" height="26" rx="2"/><rect x="812" y="352" width="40" height="26" rx="2"/>
    <rect x="864" y="352" width="40" height="26" rx="2"/><rect x="916" y="352" width="40" height="26" rx="2"/>
    <rect x="760" y="392" width="40" height="26" rx="2"/><rect x="812" y="392" width="40" height="26" rx="2"/>
  </g>
  <!-- green status LEDs -->
  <g fill="#34d399" filter="url(#glow)">
    <circle cx="1075" cy="330" r="4"/><circle cx="1075" cy="350" r="4"/><circle cx="1075" cy="370" r="4"/>
  </g>

  <!-- CO2-free leaves motif (subtle) -->
  <g fill="#34d399" opacity="0.5">
    <path d="M 480 210 Q 495 190 515 195 Q 512 218 490 222 Q 482 218 480 210 Z"/>
    <path d="M 660 190 Q 675 170 695 175 Q 692 198 670 202 Q 662 198 660 190 Z"/>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="190" height="38" rx="19" fill="#0d9488"/>
  <text x="135" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">電力・冷却技術</text>

  <!-- Badge top right -->
  <rect x="920" y="32" width="240" height="44" rx="8" fill="#065f46" opacity="0.95"/>
  <text x="1040" y="60" font-family="sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">原子力の黄金時代、再び</text>

  <!-- Accent bar -->
  <rect x="40" y="418" width="5" height="122" rx="2.5" fill="#2dd4bf"/>

  <!-- Kicker -->
  <text x="60" y="476" font-family="sans-serif" font-size="52" font-weight="900" fill="#5eead4" filter="url(#ts)">AI電力危機の救世主か</text>

  <!-- Main headline -->
  <text x="60" y="548" font-family="sans-serif" font-size="34" font-weight="900" fill="white" filter="url(#ts)">小型原子炉SMRとデータセンターの近未来</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#99f6e4" filter="url(#ts)">24時間CO2フリーの大電力 — 世界の最前線と日本の現在地</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
