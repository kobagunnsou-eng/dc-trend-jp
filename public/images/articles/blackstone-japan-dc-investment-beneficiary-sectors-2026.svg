<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Photo: money/capital flowing into Japan DC, financial-district feel -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="50%" stop-color="#101a35"/>
      <stop offset="100%" stop-color="#1a2b1a"/>
    </linearGradient>
    <radialGradient id="goldglow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a1020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vgn" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.78)"/>
    </radialGradient>
    <linearGradient id="tov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="35%" stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.93)"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,1)"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#goldglow)"/>

  <!-- Financial skyline (Tokyo) background -->
  <g fill="#0c1430" opacity="0.8">
    <rect x="40" y="280" width="60" height="200"/><rect x="110" y="240" width="70" height="240"/>
    <rect x="190" y="300" width="55" height="180"/><rect x="1010" y="260" width="65" height="220"/>
    <rect x="1085" y="300" width="60" height="180"/><rect x="1155" y="320" width="50" height="160"/>
  </g>
  <g fill="#fbbf24" opacity="0.4">
    <rect x="120" y="260" width="9" height="7"/><rect x="135" y="260" width="9" height="7"/>
    <rect x="120" y="275" width="9" height="7"/><rect x="1025" y="280" width="9" height="7"/>
    <rect x="1040" y="280" width="9" height="7"/><rect x="1025" y="295" width="9" height="7"/>
  </g>

  <!-- Central DC building (the destination of capital) -->
  <rect x="470" y="200" width="260" height="280" rx="6" fill="#0e1b3a" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- DC server window grid glowing -->
  <g fill="#22d3ee" opacity="0.8" filter="url(#glow)">
    <rect x="490" y="222" width="32" height="22" rx="2"/><rect x="532" y="222" width="32" height="22" rx="2"/>
    <rect x="574" y="222" width="32" height="22" rx="2"/><rect x="616" y="222" width="32" height="22" rx="2"/>
    <rect x="658" y="222" width="32" height="22" rx="2"/>
    <rect x="490" y="256" width="32" height="22" rx="2"/><rect x="532" y="256" width="32" height="22" rx="2"/>
    <rect x="574" y="256" width="32" height="22" rx="2"/><rect x="616" y="256" width="32" height="22" rx="2"/>
    <rect x="658" y="256" width="32" height="22" rx="2"/>
    <rect x="490" y="290" width="32" height="22" rx="2"/><rect x="532" y="290" width="32" height="22" rx="2"/>
    <rect x="574" y="290" width="32" height="22" rx="2"/><rect x="616" y="290" width="32" height="22" rx="2"/>
    <rect x="490" y="324" width="32" height="22" rx="2"/><rect x="532" y="324" width="32" height="22" rx="2"/>
    <rect x="574" y="324" width="32" height="22" rx="2"/>
  </g>
  <!-- cooling units on roof -->
  <g fill="#1a2950" stroke="#3b82f6" stroke-width="1">
    <rect x="485" y="182" width="44" height="20" rx="2"/><rect x="545" y="178" width="44" height="24" rx="2"/>
    <rect x="605" y="182" width="44" height="20" rx="2"/><rect x="665" y="178" width="44" height="24" rx="2"/>
  </g>
  <!-- Japan flag mark on building -->
  <circle cx="600" cy="420" r="22" fill="#bc002d" opacity="0.9"/>
  <rect x="560" y="398" width="80" height="44" rx="3" fill="none" stroke="#e2e8f0" stroke-width="1.5" opacity="0.5"/>

  <!-- Golden coins / capital flowing IN from both sides -->
  <g filter="url(#glow)">
    <!-- left stream -->
    <path d="M 60 150 Q 250 180 470 280" fill="none" stroke="#fcd34d" stroke-width="6" opacity="0.7"/>
    <path d="M 80 110 Q 280 150 480 250" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.5"/>
    <!-- right stream -->
    <path d="M 1140 150 Q 950 180 730 280" fill="none" stroke="#fcd34d" stroke-width="6" opacity="0.7"/>
    <path d="M 1120 110 Q 920 150 720 250" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.5"/>
  </g>
  <!-- coins -->
  <g fill="#fcd34d" stroke="#d97706" stroke-width="1.5">
    <circle cx="150" cy="158" r="16"/><circle cx="260" cy="178" r="14"/><circle cx="360" cy="218" r="12"/>
    <circle cx="1050" cy="158" r="16"/><circle cx="940" cy="178" r="14"/><circle cx="840" cy="218" r="12"/>
    <circle cx="200" cy="125" r="11"/><circle cx="1000" cy="125" r="11"/>
  </g>
  <!-- yen marks on coins -->
  <g fill="#92400e" font-family="sans-serif" font-size="16" font-weight="900" text-anchor="middle">
    <text x="150" y="164">¥</text><text x="1050" y="164">¥</text>
  </g>
  <g fill="#92400e" font-family="sans-serif" font-size="13" font-weight="900" text-anchor="middle">
    <text x="260" y="183">¥</text><text x="940" y="183">¥</text>
  </g>

  <!-- 5-stage value chain arrows below (subtle) -->
  <g opacity="0.55">
    <rect x="180" y="500" width="160" height="34" rx="17" fill="#1e3a5f"/>
    <text x="260" y="522" font-family="sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">建設</text>
    <rect x="350" y="500" width="160" height="34" rx="17" fill="#1e3a5f"/>
    <text x="430" y="522" font-family="sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">電源</text>
    <rect x="520" y="500" width="160" height="34" rx="17" fill="#1e3a5f"/>
    <text x="600" y="522" font-family="sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">冷却</text>
    <rect x="690" y="500" width="160" height="34" rx="17" fill="#1e3a5f"/>
    <text x="770" y="522" font-family="sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">接続</text>
    <rect x="860" y="500" width="160" height="34" rx="17" fill="#1e3a5f"/>
    <text x="940" y="522" font-family="sans-serif" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle">運営</text>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vgn)"/>

  <!-- Text overlay -->
  <rect x="0" y="330" width="1200" height="300" fill="url(#tov)"/>

  <!-- Category badge -->
  <rect x="40" y="36" width="165" height="38" rx="19" fill="#0369a1"/>
  <text x="122" y="61" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">海外DC動向</text>

  <!-- Big figure badge top right -->
  <rect x="930" y="32" width="230" height="44" rx="8" fill="#ca8a04" opacity="0.95"/>
  <text x="1045" y="60" font-family="sans-serif" font-size="17" font-weight="900" fill="white" text-anchor="middle">日本に¥4.8兆円投資</text>

  <!-- Accent bar -->
  <rect x="40" y="418" width="5" height="122" rx="2.5" fill="#fbbf24"/>

  <!-- Kicker -->
  <text x="60" y="476" font-family="sans-serif" font-size="50" font-weight="900" fill="#fcd34d" filter="url(#ts)">ブラックストーンの衝撃</text>

  <!-- Main headline -->
  <text x="60" y="548" font-family="sans-serif" font-size="33" font-weight="900" fill="white" filter="url(#ts)">恩恵が波及する5つの工程と関連セクター</text>

  <!-- Sub-line -->
  <text x="60" y="596" font-family="sans-serif" font-size="17" fill="#fde68a" filter="url(#ts)">建設・電源・冷却・接続・運営 — 日本のどこにマネーが落ちるか</text>

  <text x="1160" y="618" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DCトレンド研究</text>
</svg>
