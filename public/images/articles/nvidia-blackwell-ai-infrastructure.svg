<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- brand stripe -->
  <rect x="0" y="0" width="12" height="630" fill="#2563eb"/>
  <!-- GPU chip motif -->
  <rect x="430" y="165" width="340" height="300" rx="8" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <rect x="480" y="215" width="240" height="200" rx="4" fill="#1e3a8a" opacity="0.7"/>
  <rect x="510" y="245" width="180" height="140" rx="2" fill="#2563eb" opacity="0.5"/>
  <!-- circuit lines left -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.8">
    <line x1="350" y1="230" x2="430" y2="230"/><line x1="350" y1="270" x2="430" y2="270"/>
    <line x1="350" y1="310" x2="430" y2="310"/><line x1="350" y1="350" x2="430" y2="350"/>
    <line x1="350" y1="390" x2="430" y2="390"/>
  </g>
  <!-- circuit lines right -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.8">
    <line x1="770" y1="230" x2="850" y2="230"/><line x1="770" y1="270" x2="850" y2="270"/>
    <line x1="770" y1="310" x2="850" y2="310"/><line x1="770" y1="350" x2="850" y2="350"/>
    <line x1="770" y1="390" x2="850" y2="390"/>
  </g>
  <!-- circuit lines top -->
  <g stroke="#60a5fa" stroke-width="2" opacity="0.6">
    <line x1="510" y1="100" x2="510" y2="165"/><line x1="560" y1="100" x2="560" y2="165"/>
    <line x1="640" y1="100" x2="640" y2="165"/><line x1="690" y1="100" x2="690" y2="165"/>
  </g>
  <!-- glow dots -->
  <circle cx="600" cy="315" r="6" fill="#fbbf24"/>
  <circle cx="350" cy="230" r="4" fill="#34d399"/>
  <circle cx="350" cy="310" r="4" fill="#34d399"/>
  <circle cx="350" cy="390" r="4" fill="#34d399"/>
  <circle cx="850" cy="270" r="4" fill="#f87171"/>
  <circle cx="850" cy="350" r="4" fill="#f87171"/>
  <!-- label area -->
  <rect x="0" y="555" width="1200" height="75" fill="#0f172a" opacity="0.9"/>
  <rect x="0" y="553" width="1200" height="3" fill="#2563eb"/>
  <text x="40" y="600" font-family="sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">NVIDIA Blackwell（GB200）AIインフラ</text>
  <text x="40" y="618" font-family="sans-serif" font-size="16" fill="#64748b">AI・HPCインフラ ｜ DCトレンド研究</text>
</svg>
