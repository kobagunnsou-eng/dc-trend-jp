<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="greensky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <radialGradient id="sunburst" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="g3"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#greensky)"/>
  <rect width="1200" height="630" fill="url(#sunburst)"/>
  <!-- ground -->
  <rect x="0" y="440" width="1200" height="190" fill="#14532d"/>
  <rect x="0" y="440" width="1200" height="30" fill="#16a34a" opacity="0.5"/>
  <!-- sun rays -->
  <g stroke="#fef08a" stroke-width="3" opacity="0.4">
    <line x1="360" y1="250" x2="0" y2="0"/><line x1="360" y1="250" x2="200" y2="0"/>
    <line x1="360" y1="250" x2="400" y2="0"/><line x1="360" y1="250" x2="600" y2="0"/>
    <line x1="360" y1="250" x2="0" y2="250"/><line x1="360" y1="250" x2="0" y2="440"/>
    <line x1="360" y1="250" x2="200" y2="440"/>
  </g>
  <!-- sun -->
  <circle cx="360" cy="250" r="70" fill="#fef9c3" opacity="0.9"/>
  <circle cx="360" cy="250" r="50" fill="white"/>
  <!-- wind turbines large -->
  <line x1="700" y1="440" x2="700" y2="160" stroke="#f1f5f9" stroke-width="6"/>
  <ellipse cx="700" cy="155" rx="12" ry="12" fill="#e2e8f0"/>
  <line x1="700" y1="155" x2="640" y2="50" stroke="#f1f5f9" stroke-width="5"/>
  <line x1="700" y1="155" x2="780" y2="80" stroke="#f1f5f9" stroke-width="5"/>
  <line x1="700" y1="155" x2="670" y2="240" stroke="#f1f5f9" stroke-width="5"/>
  <line x1="920" y1="440" x2="920" y2="200" stroke="#e2e8f0" stroke-width="5"/>
  <ellipse cx="920" cy="195" rx="10" ry="10" fill="#cbd5e1"/>
  <line x1="920" y1="195" x2="868" y2="110" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="920" y1="195" x2="985" y2="135" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="920" y1="195" x2="895" y2="265" stroke="#e2e8f0" stroke-width="4"/>
  <line x1="1080" y1="440" x2="1080" y2="240" stroke="#cbd5e1" stroke-width="4"/>
  <line x1="1080" y1="240" x2="1035" y2="175" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="1080" y1="240" x2="1130" y2="195" stroke="#cbd5e1" stroke-width="3"/>
  <!-- solar panels field -->
  <g fill="#1e40af" stroke="#3b82f6" stroke-width="1">
    {[460,490,520,550,580,610].map(x=>
      [460,480,500].map(y=>`<rect x="${x}" y="${y}" width="22" height="14" rx="1"/>`).join('')
    ).join('')}
  </g>
  <!-- RE100 badge -->
  <rect x="80" y="170" width="200" height="80" rx="8" fill="#16a34a" opacity="0.9"/>
  <text x="105" y="225" font-family="sans-serif" font-size="42" font-weight="900" fill="white">RE100</text>
  <rect x="0" y="558" width="1200" height="72" fill="#052e16" opacity="0.9"/>
  <rect x="0" y="556" width="1200" height="4" fill="#16a34a"/>
  <text x="40" y="600" font-family="sans-serif" font-size="30" font-weight="900" fill="white">カーボンニュートラル RE100・PPA・CFE最前線</text>
  <text x="40" y="618" font-family="sans-serif" font-size="15" fill="#86efac">電力・冷却技術 ｜ DCトレンド研究</text>
</svg>
